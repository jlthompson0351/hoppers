<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Load Cell Scale Transmitter</title>
    <style>
      :root { --bg:#0b1220; --card:#121a2b; --text:#e6edf3; --muted:#9fb0c0; --accent:#61dafb; --warn:#ffcc66; --bad:#ff6b6b; --ok:#2ecc71; }
      body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background:var(--bg); color:var(--text); }
      header { padding:16px 18px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:space-between; gap:12px; }
      header .title { font-weight:700; letter-spacing:.2px; }
      header .meta { color:var(--muted); font-size:13px; }
      nav a { color:var(--text); text-decoration:none; margin-right:12px; opacity:.9; }
      nav a:hover { opacity:1; color:var(--accent); }
      main { padding:18px; max-width:1100px; margin:0 auto; }
      .grid { display:grid; gap:14px; grid-template-columns: repeat(12, 1fr); }
      .card { background:var(--card); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:14px; }
      .span-4 { grid-column: span 4; } .span-6 { grid-column: span 6; } .span-12 { grid-column: span 12; }
      .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.12em; }
      .v { font-size:28px; font-weight:700; margin-top:6px; }
      .row { display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; }
      .pill { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; border:1px solid rgba(255,255,255,.12); color:var(--muted); }
      .pill.ok { color:var(--ok); border-color: rgba(46, 204, 113, .35); }
      .pill.warn { color:var(--warn); border-color: rgba(255, 204, 102, .35); }
      .pill.bad { color:var(--bad); border-color: rgba(255, 107, 107, .35); }
      table { width:100%; border-collapse: collapse; }
      th, td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.08); font-size:13px; }
      th { text-align:left; color:var(--muted); font-weight:600; }
      input, textarea, select { width:100%; background:#0d1526; color:var(--text); border:1px solid rgba(255,255,255,.12); border-radius:8px; padding:10px; }
      button { background:var(--accent); border:none; border-radius:10px; padding:10px 12px; font-weight:700; cursor:pointer; }
      button:hover { filter: brightness(1.06); }
      .small { font-size:12px; color:var(--muted); }
      @media (max-width: 900px) { .span-4, .span-6 { grid-column: span 12; } }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="title">Load Cell Scale Transmitter</div>
        <div class="meta">{{ now }}</div>
      </div>
      <nav>
        <a href="{{ url_for('routes.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('routes.calibration_get') }}">Calibration Hub</a>
        <a href="{{ url_for('routes.settings_get') }}">⚙️ Settings</a>
        <a href="{{ url_for('routes.logs_get') }}">Logs</a>
        {% if maintenance_enabled %}
          <a href="{{ url_for('routes.config_get') }}" style="opacity:0.6;">Config (Raw)</a>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
